name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"    # runs daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually too
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: codewithishita
          outputs: |
            dist/snake.svg?color_snake=%237C3AED&color_dots=%232d2b3f,%23c4b5fd,%23a78bfa,%238b5cf6,%237c3aed
            dist/snake-dark.svg?color_snake=%23c084fc&color_dots=%231e1e2e,%23c4b5fd,%23a78bfa,%238b5cf6,%237c3aed

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
